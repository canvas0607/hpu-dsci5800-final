<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>家具选择助手</title>
    <link rel="stylesheet" href="/static/styles.css?v=5" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">HPU-DCSI5800 · Furniture Planning Assistant</p>
          <h1>家具选择助手</h1>
        </div>
        <div class="identity-pill">
          <span id="identityName">游客模式</span>
          <small id="identityStatus">正在准备会话...</small>
        </div>
      </header>

      <section class="workspace">
        <aside class="panel">
          <section class="identity-box">
            <h2>身份</h2>
            <label>
              账户名称
              <input id="accountName" placeholder="例如 zhangsan" autocomplete="username" />
            </label>
            <div class="button-row">
              <button id="loginBtn" type="button">使用账户</button>
              <button id="guestBtn" class="secondary" type="button">游客模式</button>
            </div>
            <input id="uid" type="hidden" />
          </section>

          <section class="settings-box">
            <h2>约束</h2>
            <label>
              预算
              <input id="budget" type="number" min="0" step="1" placeholder="例如 8000" />
            </label>

            <label>
              空间图片 / 户型 PDF
              <input id="image" type="file" accept="image/*,.pdf,application/pdf" />
            </label>
          </section>
        </aside>

        <section class="composer">
          <section id="result" class="result hidden">
            <div class="summary">
              <p id="total"></p>
              <div id="chatOutput" class="chat-output"></div>
              <div class="download-actions">
                <button id="downloadMarkdownBtn" class="secondary hidden" type="button">下载 Markdown 方案</button>
                <button id="downloadPdfBtn" class="secondary hidden" type="button">下载 PDF 方案</button>
              </div>
            </div>
            <div id="roomPreview" class="room-preview hidden">
              <img id="roomImage" class="hidden" alt="整体家具摆放效果图" />
              <div>
                <h2>摆放方案</h2>
                <p id="renderNote" class="render-note hidden"></p>
                <div id="placements" class="placements"></div>
              </div>
            </div>
            <div id="roomPlans" class="room-plans hidden"></div>
            <div id="items" class="items"></div>
          </section>

          <form id="recommendForm" class="chat-composer">
            <label class="sr-only" for="request">需求</label>
            <textarea
              id="request"
              rows="3"
              placeholder="输入你的需求，例如：只给我一个卧室方案，20 平，4x5，喜欢温馨木色，预算 8000。"
            ></textarea>
            <button id="submitBtn" type="submit">发送</button>
          </form>
        </section>
      </section>
    </main>
    <script src="/static/app.js?v=20"></script>
  </body>
</html>
